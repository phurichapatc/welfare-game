<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมช้อปปิ้งสวัสดิการพนักงาน</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 10px;
        }
        .instructions {
            text-align: center;
            color: #5f6368;
            margin-bottom: 30px;
        }
        /* แถบคะแนนคงเหลือคงที่ด้านบน */
        .budget-sticky {
            position: sticky;
            top: 10px;
            background: #e8f0fe;
            border: 2px solid #1a73e8;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #1a73e8;
            margin-bottom: 25px;
            z-index: 100;
        }
        /* รายการสวัสดิการ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: #fff;
            border: 2px solid #dadce0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }
        .card.selected {
            border-color: #34a853;
            background-color: #e6f4ea;
        }
        .card .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .card .title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #202124;
        }
        .card .price {
            display: inline-block;
            background: #f1f3f4;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            color: #5f6368;
            font-weight: bold;
        }
        .card.selected .price {
            background: #34a853;
            color: white;
        }
        /* ปุ่มส่งข้อมูล */
        .submit-btn {
            display: block;
            width: 100%;
            background: #1a73e8;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background: #1557b0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🛍️ ช้อปปิ้งสวัสดิการตามใจคุณ</h1>
    <p class="instructions">บริษัทมอบงบประมาณจำลองให้คุณคนละ 100 คะแนน เลือกสวัสดิการที่ตอบโจทย์ชีวิตคุณมากที่สุดจนกว่าแต้มจะหมด!</p>
    
    <div class="budget-sticky">
        คะแนนคงเหลือของคุณ: <span id="budget">100</span> คะแนน
    </div>

    <div class="grid">
        <div class="card" onclick="toggleSelect(this, 40, 'ประกันสุขภาพอัปเกรด')">
            <div class="icon">🏥</div>
            <div class="title">ประกันสุขภาพอัปเกรด</div>
            <div class="price">40 คะแนน</div>
        </div>

        <div class="card" onclick="toggleSelect(this, 30, 'เงินสนับสนุนฟิตเนส')">
            <div class="icon">🏋️‍♂️</div>
            <div class="title">เงินสนับสนุนฟิตเนส</div>
            <div class="price">30 คะแนน</div>
        </div>

        <div class="card" onclick="toggleSelect(this, 20, 'คอร์สเรียนตามใจชอบ')">
            <div class="icon">📚</div>
            <div class="title">คอร์สเรียนตามใจชอบ</div>
            <div class="price">20 คะแนน</div>
        </div>

        <div class="card" onclick="toggleSelect(this, 10, 'วันหยุดพิเศษวันเกิด')">
            <div class="icon">🎂</div>
            <div class="title">วันหยุดพิเศษวันเกิด</div>
            <div class="price">10 คะแนน</div>
        </div>
    </div>

    <button class="submit-btn" onclick="submitWelfare()">ส่งตะกร้าสวัสดิการของฉัน 🚀</button>
</div>

<script>
    let currentBudget = 100;
    let selectedWelfares = [];

    function toggleSelect(card, price, name) {
        // ตรวจสอบว่าสวัสดิการนี้เคยถูกเลือกไปแล้วหรือยัง
        if (card.classList.contains('selected')) {
            // ลบออกถ้าพนักงานยกเลิกการเลือก
            card.classList.remove('selected');
            currentBudget += price;
            selectedWelfares = selectedWelfares.filter(item => item !== name);
        } else {
            // ตรวจสอบว่าคะแนนพอกดซื้อไหม
            if (currentBudget >= price) {
                card.classList.add('selected');
                currentBudget -= price;
                selectedWelfares.push(name);
            } else {
                alert('⚠️ คะแนนของคุณไม่เพียงพอสำหรับสวัสดิการชิ้นนี้แล้วครับ ลองยกเลิกอันอื่นก่อนนะ!');
            }
        }
        // อัปเดตตัวเลขบนหน้าจอ
        document.getElementById('budget').innerText = currentBudget;
    }

    function submitWelfare() {
        if (selectedWelfares.length === 0) {
            alert('คุณยังไม่ได้เลือกสวัสดิการชิ้นไหนเลย ลองเลือกดูหน่อยสิครับ!');
            return;
        }
        alert('🎉 บันทึกข้อมูลสำเร็จ!\nสวัสดิการที่คุณเลือกคือ:\n' + selectedWelfares.join('\n') + '\n\nคะแนนเหลือของคุณ: ' + currentBudget);
        
        // ตรงนี้ในอนาคตเราสามารถเขียนให้โค้ดยิงข้อมูลไปเก็บใน Google Sheets หรือหลังบ้านขององค์กรได้ครับ
    }
</script>

</body>
</html>
